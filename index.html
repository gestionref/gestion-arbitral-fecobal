<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FeCoBal · Gestión Arbitral</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --r:#E8272A;--r-dim:#7a1214;--r-bg:#2a1415;--r-light:#ff6b6e;
  --b:#2B3990;--b-dim:#1a2260;--b-bg:#161c3a;
  --c:#29ABE2;--c-dim:#1a7aab;--c-bg:#0f2a3a;--c-light:#6dcfff;
  --d1:#0d0d10;--d2:#14141a;--d3:#1c1c24;--d4:#25252f;--d5:#32323e;--d6:#424250;
  --tx:#f0f0f4;--mu:#8888a0;--hi:#505068;
  --rs:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--d1);color:var(--tx);min-height:100vh;display:flex;flex-direction:column}
.screen{display:none}.screen.active{display:flex;flex-direction:column;flex:1}

/* TOP BAR */
.topbar{background:var(--d2);border-bottom:1px solid var(--d4);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{font-size:15px;font-weight:700;letter-spacing:.01em}
.logo-fe{color:var(--r)}.logo-co{color:var(--b)}.logo-bal{color:var(--c)}
.logo-sep{color:var(--hi);margin:0 6px;font-weight:400}
.logo-sub{font-size:12px;color:var(--mu);font-weight:400}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.user-pill{background:var(--d4);border-radius:20px;padding:5px 14px 5px 5px;display:flex;align-items:center;gap:8px;cursor:pointer}
.user-pill:hover{background:var(--d5)}
.user-avatar{width:26px;height:26px;border-radius:50%;background:var(--b);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--c)}
.user-name{font-size:12px;color:var(--mu)}
.btn-logout{font-size:12px;color:var(--hi);background:none;border:none;cursor:pointer;padding:4px 8px}
.btn-logout:hover{color:var(--mu)}

/* SIDEBAR + CONTENT */
.app-body{display:flex;flex:1;overflow:hidden;height:calc(100vh - 53px)}
.sidebar{background:var(--d2);width:200px;flex-shrink:0;padding:16px 8px;display:flex;flex-direction:column;border-right:1px solid var(--d4);overflow-y:auto}
.s-section{font-size:10px;color:var(--hi);letter-spacing:.08em;text-transform:uppercase;padding:12px 10px 5px;margin-top:4px}
.s-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--rs);font-size:13px;color:var(--mu);cursor:pointer;margin-bottom:1px;transition:background .12s,color .12s;position:relative}
.s-item:hover:not(.active){background:var(--d3);color:var(--tx)}
.s-item.active{background:var(--d4);color:var(--tx)}
.s-indicator{width:3px;height:16px;border-radius:2px;flex-shrink:0;background:transparent}
.s-item.active .s-indicator{background:var(--c)}
.s-dot{width:6px;height:6px;border-radius:50%;background:var(--hi);flex-shrink:0;transition:background .12s}
.s-item.active .s-dot,.s-item:hover .s-dot{background:var(--c)}

/* MAIN CONTENT */
.main{flex:1;overflow-y:auto;padding:24px}

/* CARDS */
.card{background:var(--d3);border:1px solid var(--d4);border-radius:var(--rl);padding:16px 20px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--mu);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';display:block;width:3px;height:12px;border-radius:2px;background:var(--c);flex-shrink:0}

/* METRICS GRID */
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.metric{background:var(--d3);border:1px solid var(--d4);border-radius:var(--rl);padding:14px 16px;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:var(--rl) 0 0 var(--rl)}
.metric.m-c::before{background:var(--c)}
.metric.m-b::before{background:var(--b)}
.metric.m-r::before{background:var(--r)}
.metric.m-g::before{background:var(--d6)}
.metric-label{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.metric-value{font-size:24px;font-weight:600;letter-spacing:-.02em;color:var(--tx);line-height:1}
.metric-sub{font-size:11px;color:var(--hi);margin-top:5px}

/* BALANCE TABLE */
.balance-table{width:100%;border-collapse:collapse;font-size:13px}
.balance-table th{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--mu);padding:8px 12px;border-bottom:1px solid var(--d5);text-align:left}
.balance-table th.acab{color:var(--c)}
.balance-table th.ucah{color:var(--r)}
.balance-table td{padding:10px 12px;border-bottom:1px solid var(--d4);color:var(--tx);font-size:13px}
.balance-table tr:last-child td{border-bottom:none}
.balance-table td.row-label{color:var(--mu);font-size:12px}
.balance-table td.val-acab{color:var(--c);font-weight:500}
.balance-table td.val-ucah{color:var(--r);font-weight:500}
.pct{font-size:11px;color:var(--hi);margin-left:4px;font-weight:400}

/* BALANCE BAR */
.bbar{height:8px;border-radius:4px;overflow:hidden;display:flex;margin:8px 0 4px}
.bbar-a{height:100%;background:var(--c)}
.bbar-u{height:100%;background:var(--r)}
.bbar-labels{display:flex;justify-content:space-between;font-size:11px}
.bbar-la{color:var(--c)}.bbar-lu{color:var(--r)}

/* FECHA BALANCE */
.fecha-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.fecha-num{font-size:11px;font-weight:600;color:var(--mu);min-width:52px}
.fecha-bar{flex:1;height:6px;background:var(--d5);border-radius:3px;overflow:hidden;display:flex}
.fb-a{height:100%;background:var(--c)}
.fb-u{height:100%;background:var(--r)}
.fecha-tot{font-size:11px;color:var(--hi);min-width:28px;text-align:right}

/* ÁRBITROS */
.arb-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.arb-card{background:var(--d3);border:1px solid var(--d4);border-radius:var(--rl);padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .15s,background .15s}
.arb-card:hover{border-color:var(--d6);background:var(--d4)}
.arb-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.av-a{background:var(--b-bg);color:var(--c);border:1px solid var(--b)}
.av-u{background:var(--r-bg);color:var(--r-light);border:1px solid var(--r-dim)}
.arb-info{flex:1;min-width:0}
.arb-name{font-size:13px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.arb-meta{font-size:11px;color:var(--hi);margin-top:2px}
.arb-stats{text-align:right;flex-shrink:0}
.arb-pts{font-size:14px;font-weight:600;color:var(--tx)}
.arb-km{font-size:10px;color:var(--hi)}

/* BADGE */
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:100px}
.badge-a{background:var(--b-bg);color:var(--c);border:1px solid var(--b-dim)}
.badge-u{background:var(--r-bg);color:var(--r-light);border:1px solid var(--r-dim)}
.badge-info{background:var(--c-bg);color:var(--c);border:1px solid var(--c-dim)}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--hi);padding:8px 12px;border-bottom:1px solid var(--d5);text-align:left}
.data-table td{padding:9px 12px;border-bottom:1px solid var(--d4);color:var(--tx)}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--d4)}

/* LEGAJO */
.profile-header{display:flex;align-items:flex-start;gap:16px}
.profile-big-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--d4);font-size:13px}
.stat-row:last-child{border-bottom:none}
.stat-label{color:var(--mu)}
.stat-value{font-weight:500;color:var(--tx)}

/* PANEL ÁRBITRO */
.arb-hero{background:linear-gradient(135deg,var(--b-bg) 0%,var(--d3) 100%);border:1px solid var(--b-dim);border-radius:var(--rl);padding:24px;margin-bottom:14px;display:flex;align-items:center;gap:16px}

/* INPUTS */
input,select{background:var(--d4);border:1px solid var(--d5);border-radius:var(--rs);color:var(--tx);padding:8px 12px;font-size:13px;font-family:'DM Sans',sans-serif;width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--c)}
select option{background:var(--d3)}
.btn{padding:8px 20px;border-radius:var(--rs);font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:opacity .15s,background .15s;border:none}
.btn-primary{background:var(--c);color:#fff}.btn-primary:hover{opacity:.88}
.btn-ghost{background:var(--d4);color:var(--mu);border:1px solid var(--d5)}.btn-ghost:hover{color:var(--tx)}

/* MONO */
.mono{font-family:'DM Mono',monospace;font-size:12px}

/* ROW */
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>*{flex:1;min-width:0}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--d1)}
.login-card{background:var(--d2);border:1px solid var(--d4);border-radius:var(--rl);padding:32px;width:360px}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo .logo{font-size:22px}
.login-logo .sub{font-size:13px;color:var(--mu);margin-top:4px}

@media(max-width:700px){
  .sidebar{width:52px}.s-item span{display:none}.s-section{display:none}.metrics-grid{grid-template-columns:1fr 1fr}.arb-grid{grid-template-columns:1fr}
}
</style>
</head>

function getDistancia(o,d){if(o===d)return 0;return DISTANCIAS[o+'|'+d]||DISTANCIAS[d+'|'+o]||0;}
function getCiudadCancha(cancha){
  const c=(cancha||'').toUpperCase().trim();
  if(CANCHA_CIUDAD[c])return CANCHA_CIUDAD[c];
  for(const[k,v]of Object.entries(CANCHA_CIUDAD)){if(c.includes(k))return v;}
  return 'Córdoba Capital';
}
function getResidencia(nombre){
  const raw=(nombre||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[,.]/g,' ').replace(/\s+/g,' ').trim();
  // Full name match first (multi-word keys)
  for(const[key,ciudad]of Object.entries(RESIDENCIAS)){
    const k=key.replace(/[,.]/g,' ').replace(/\s+/g,' ').trim();
    if(k.includes(' ')&&(raw===k||raw.includes(k))) return ciudad;
  }
  // Single word partial match
  for(const[key,ciudad]of Object.entries(RESIDENCIAS)){
    const k=key.replace(/[,.]/g,' ').replace(/\s+/g,' ').trim();
    if(!k.includes(' ')&&raw.includes(k)) return ciudad;
  }
  return 'Córdoba Capital';
}
function getKm(cancha){return 0;}

function normNombre(n){return(n||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[,\s]+/g,' ').trim();}
function initials(nombre){return nombre.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function pct(a,b){return b>0?(a/b*100).toFixed(1):0;}

function getPartidosArbitro(nombre){
  const n=normNombre(nombre).split(' ')[0];
  return DESIGNACIONES.filter(d=>normNombre(d.arbitro1).includes(n)||normNombre(d.arbitro2).includes(n));
}

function getKmArbitro(nombre){
  const residencia=getResidencia(nombre);
  const partidos=getPartidosArbitro(nombre);
  const viajes=new Map();
  partidos.forEach(d=>{
    const ciudadCancha=getCiudadCancha(d.cancha);
    const dist=getDistancia(residencia,ciudadCancha);
    if(dist>0){
      const key=(d.hoja||'')+'|'+(d.fecha||'')+'|'+(d.cancha||'').toUpperCase();
      if(!viajes.has(key)) viajes.set(key,dist);
    }
  });
  let total=0;
  viajes.forEach(dist=>total+=dist*2);
  return total;
}

function getKmAsociacion(asoc){
  // Sum unique viajes per arbitro for this asociacion only
  const viajesMap = new Map();
  DESIGNACIONES.filter(d=>d.asociacion===asoc).forEach(d=>{
    [[d.arbitro1, d.km_arb1||0],[d.arbitro2, d.km_arb2||0]].forEach(([arb,km])=>{
      if(!arb||km<=0) return;
      const key = arb+'|'+(d.hoja||'')+'|'+(d.fecha||'')+'|'+(d.cancha||'').toUpperCase();
      if(!viajesMap.has(key)) viajesMap.set(key, km);
    });
  });
  let total=0; viajesMap.forEach(km=>total+=km);
  return total;
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{s.style.display='none';s.classList.remove('active');});
  const el=document.getElementById('screen-'+id);
  el.style.display='flex';el.classList.add('active');
}

function switchSidebar(tabId,el){
  const sidebar=el.closest('.app-body');
  sidebar.querySelectorAll('.s-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  // Hide all tab-content including legajo
  sidebar.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');
  const legajo=document.getElementById('tab-legajo');
  if(legajo) legajo.style.display='none';
  const tab=document.getElementById(tabId);
  if(tab) tab.style.display='block';
  if(tabId==='tab-dashboard') renderDashboard();
  else if(tabId==='tab-arbitros') renderArbitros();
  else if(tabId==='tab-designaciones') renderDesignaciones();
  else if(tabId==='tab-estadisticas') renderEstadisticas();
  else if(tabId==='tab-arb-perfil') renderArbPerfil();
  else if(tabId==='tab-arb-partidos') renderArbPartidos();
  else if(tabId==='tab-arb-stats') renderArbStats();
}

function doLogin(){
  const user=document.getElementById('login-user').value.trim().toLowerCase();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-error');
  if(user===ADMIN_USER&&pass===ADMIN_PASS){
    currentUser={tipo:'admin',nombre:'Alexis Salera'};
    document.getElementById('admin-avatar').textContent='AS';
    document.getElementById('admin-name-display').textContent='Alexis Salera';
    showScreen('admin');
    renderDashboard();
    err.style.display='none';return;
  }
  const arb=ARBITROS.find(a=>a.username===user&&a.password===pass);
  if(arb){
    currentUser={tipo:'arbitro',...arb};
    const ini=initials(arb.nombre);
    document.getElementById('arb-avatar-top').textContent=ini;
    document.getElementById('arb-name-top').textContent=arb.nombre;
    showScreen('arbitro');
    renderArbPerfil();err.style.display='none';return;
  }
  err.style.display='block';
}

        ${[['Email',a.email||'—'],['Teléfono',a.telefono||'—'],['Fecha de nac.',a.fecha_nac||'—'],['Asociación',a.asociacion],['Categoría máx.',a.categoria_max||'—'],['Usuario',a.username]].map(([k,v])=>`<div class="stat-row"><span class="stat-label">${k}</span><span class="stat-value" style="font-size:13px">${v}</span></div>`).join('')}

        ${Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([cat,n])=>`<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--mu);padding:4px 0">${cat}<span style="color:var(--tx);font-weight:500">${n}p</span></div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Historial de partidos (${partidos.length})</div>
      ${partidos.length===0?'<div style="color:var(--mu);font-size:13px">Sin partidos registrados</div>':
      `<div style="overflow-x:auto"><table class="data-table">
        <thead><tr><th>F.</th><th>Fecha</th><th>Hora</th><th>Cancha</th><th>Categoría</th><th>Equipos</th><th>Rol</th></tr></thead>
        <tbody>${partidos.map(d=>{
          const esArb1=normNombre(d.arbitro1).includes(normNombre(a.nombre).split(' ')[0]);
          return`<tr>

            <td class="mono">${d.hora}</td><td>${d.cancha}</td><td>${d.categoria}</td>

            <td><span class="badge ${esArb1?'badge-info':'badge-a'}" style="font-size:10px">${esArb1?'Árb. 1':'Árb. 2'}</span></td>
          </tr>`;}).join('')}</tbody>
      </table></div>`}

  document.querySelectorAll('.s-item').forEach(i=>i.classList.remove('active'));

  document.querySelectorAll('#tab-dashboard,#tab-arbitros,#tab-designaciones,#tab-estadisticas').forEach(t=>t.style.display='none');
}

// ── DESIGNACIONES ────────────────────────────────────────
function renderDesignaciones(){
  const c=document.getElementById('tab-designaciones');
  const fechas=[...new Set(DESIGNACIONES.map(d=>d.fecha).filter(f=>f&&!isNaN(Number(f))))].sort((a,b)=>Number(a)-Number(b));
  c.innerHTML=`
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
      <input type="text" id="buscar-desig" placeholder="Buscar árbitro, cancha, categoría..." style="max-width:320px" oninput="filtrarDesig()"/>
      <select id="filtro-fecha-desig" onchange="filtrarDesig()" style="width:140px">
        <option value="">Todas las fechas</option>
        ${fechas.map(f=>`<option value="${f}">Fecha ${f}</option>`).join('')}
      </select>
      <select id="filtro-asoc-desig" onchange="filtrarDesig()" style="width:120px">
        <option value="">Todas</option><option value="ACAB">ACAB</option><option value="UCAH">UCAH</option>
      </select>
    </div>
    <div id="desig-tabla"></div>`;
  filtrarDesig();
}

function filtrarDesig(){
  const buscar=(document.getElementById('buscar-desig')||{}).value.toLowerCase()||'';
  const fecha=(document.getElementById('filtro-fecha-desig')||{}).value||'';
  const asoc=(document.getElementById('filtro-asoc-desig')||{}).value||'';
  const lista=DESIGNACIONES.filter(d=>
    (!fecha||d.fecha==fecha)&&(!asoc||d.asociacion===asoc)&&
    (!buscar||[d.arbitro1,d.arbitro2,d.cancha,d.categoria,d.equipo_a,d.equipo_b].some(v=>(v||'').toLowerCase().includes(buscar)))
  );
  const c=document.getElementById('desig-tabla');
  c.innerHTML=`<div style="font-size:12px;color:var(--mu);margin-bottom:10px">${lista.length} partidos</div>
  <div class="card" style="padding:0;overflow:hidden">
  <div style="overflow-x:auto"><table class="data-table">
    <thead><tr><th>F.</th><th>Fecha</th><th>Hora</th><th>Cancha</th><th>Categoría</th><th>Árbitro 1</th><th>Árbitro 2</th><th>Asoc.</th></tr></thead>
    <tbody>${lista.map(d=>`<tr>
      <td class="mono">${d.fecha}</td><td style="font-size:12px">${d.dia}</td>
      <td class="mono">${d.hora}</td><td>${d.cancha}</td><td>${d.categoria}</td>
      <td style="font-weight:500">${d.arbitro1}</td><td style="color:var(--mu)">${d.arbitro2}</td>
      <td><span class="badge ${d.asociacion==='ACAB'?'badge-a':'badge-u'}">${d.asociacion}</span></td>
    </tr>`).join('')}</tbody>
  </table></div></div>`;
}

// ── ESTADÍSTICAS ─────────────────────────────────────────
function renderEstadisticas(){
  const c=document.getElementById('tab-estadisticas');
  const total=DESIGNACIONES.length;
  const porArb={};
  DESIGNACIONES.forEach(d=>{[d.arbitro1,d.arbitro2].forEach(a=>{if(a){const n=a.trim();porArb[n]=(porArb[n]||0)+1;}});});
  const topArb=Object.entries(porArb).sort((a,b)=>b[1]-a[1]).slice(0,15);
  const porCat={};
  DESIGNACIONES.forEach(d=>{const cat=(d.categoria||'').trim();if(cat)porCat[cat]=(porCat[cat]||0)+1;});
  const cats=Object.entries(porCat).sort((a,b)=>b[1]-a[1]);
  c.innerHTML=`
    ${(()=>{
      function aE(id,tit,html){
        return '<div style="border:1px solid var(--d5);border-radius:var(--rs);margin-bottom:8px;overflow:hidden">'
          +'<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;background:var(--d4)" data-hoja="est-'+id+'" onclick="toggleHoja(this.dataset.hoja)">'
          +'<span style="font-size:13px;font-weight:600;color:var(--tx);flex:1">'+tit+'</span>'
          +'<span id="arrow-e-'+id+'" style="color:var(--hi);font-size:12px;transition:transform .2s">▶</span>'
          +'</div>'
          +'<div id="hoja-body-e-'+id+'" style="display:none;padding:14px">'+html+'</div>'
          +'</div>';
      }
      const catHtml=cats.map(([cat,n])=>'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-size:12px;color:var(--mu);flex:1">'+cat+'</span><div style="width:80px;height:4px;background:var(--d5);border-radius:2px;overflow:hidden"><div style="height:100%;background:var(--c);width:'+(n/total*100)+'%"></div></div><span style="font-size:12px;font-weight:500;min-width:28px;text-align:right">'+n+'</span></div>').join('');
      const topHtml=topArb.slice(0,8).map(([nombre,n],i)=>{const arb=ARBITROS.find(a=>normNombre(a.nombre).includes(normNombre(nombre).split(' ')[0]));const km=getKmArbitro(nombre);return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px"><span style="font-size:11px;color:var(--hi);min-width:16px">'+(i+1)+'</span><span style="font-size:13px;flex:1;color:var(--tx)">'+nombre+'</span><span style="font-size:11px;color:var(--mu)">'+km+'km</span><span style="font-size:13px;font-weight:600">'+n+'</span>'+(arb?'<span class="badge '+(arb.asociacion==='ACAB'?'badge-a':'badge-u')+'">'+arb.asociacion+'</span>':'')+'</div>';}).join('');
      const rankHtml='<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>#</th><th>Árbitro</th><th>Partidos</th><th>KM est.</th><th>Adultos</th><th>Inferiores</th><th>Asoc.</th></tr></thead><tbody>'+topArb.map(([nombre,n],i)=>{const arb=ARBITROS.find(a=>normNombre(a.nombre).includes(normNombre(nombre).split(' ')[0]));const pts=getPartidosArbitro(nombre);const km=getKmArbitro(nombre);const adt=pts.filter(d=>esAdulto(d.categoria)).length;return '<tr><td style="color:var(--hi)">'+(i+1)+'</td><td style="font-weight:500">'+nombre+'</td><td><strong>'+n+'</strong></td><td class="mono" style="color:var(--mu)">'+km+'km</td><td>'+adt+'</td><td>'+(pts.length-adt)+'</td><td>'+(arb?'<span class="badge '+(arb.asociacion==='ACAB'?'badge-a':'badge-u')+'">'+arb.asociacion+'</span>':'')+'</td></tr>';}).join('')+'</tbody></table></div>';
      return aE('cats','Partidos por categoría',catHtml)
        +aE('toparb','Top árbitros por partidos',topHtml);
    })()}
    <div style="border:1px solid var(--d5);border-radius:var(--rs);margin-bottom:8px;overflow:hidden">
      <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;background:var(--d4)" data-hoja="e-kmfechas" onclick="toggleHoja(this.dataset.hoja)">
        <span style="font-size:13px;font-weight:600;color:var(--tx);flex:1">Distribución de KM por fin de semana</span>
        <span id="arrow-e-kmfechas" style="color:var(--hi);font-size:12px;transition:transform .2s">▶</span>
      </div>
      <div id="hoja-body-e-kmfechas" style="display:none;padding:14px">
        <div id="hojas-acordeon">
          ${(()=>{
            const hojas={};
            DESIGNACIONES.forEach(d=>{const h=d.hoja||'Sin fecha';if(!hojas[h])hojas[h]=[];hojas[h].push(d);});
            const orden=['FECHA 1','REP1','FECHA 2','FECHA 3','FECHA 4','FECHA 5','FECHA 6','FECHA 7','F REC 2'];
            const arr=orden.filter(h=>hojas[h]).concat(Object.keys(hojas).filter(h=>!orden.includes(h)&&hojas[h]));
            return arr.map(h=>{
              const partidos=hojas[h];
              const acab=partidos.filter(d=>d.asociacion==='ACAB').length;
              const ucah=partidos.filter(d=>d.asociacion==='UCAH').length;
              const tot=partidos.length;
              const vMap=new Map();
              partidos.forEach(d=>{
                [[d.arbitro1,d.km_arb1||0],[d.arbitro2,d.km_arb2||0]].forEach(([a,km])=>{
                  if(!a||km<=0)return;
                  const key=normNombre(a)+'|'+(d.hoja||'')+'|'+(d.fecha||'')+'|'+(d.cancha||'').toUpperCase();
                  if(!vMap.has(key))vMap.set(key,{km,asoc:d.asociacion});
                });
              });
              let kmH=0,kmHA=0,kmHU=0;
              vMap.forEach(v=>{kmH+=v.km;if(v.asoc==='ACAB')kmHA+=v.km;else kmHU+=v.km;});
              const hid=h.replace(/ /g,'-');
              return '<div style="border:1px solid var(--d5);border-radius:var(--rs);margin-bottom:8px;overflow:hidden">'
                +'<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;background:var(--d4)" onclick="toggleHoja(\''+hid+'\')"> '
                +'<span style="font-size:13px;font-weight:600;color:var(--tx);flex:1">'+h+'</span>'
                +'<span style="font-size:12px;color:var(--mu)">'+tot+' partidos</span>'
                +'<span style="font-size:11px;color:var(--c)">ACAB '+acab+' ('+pct(acab,tot)+'%)</span>'
                +'<span style="font-size:11px;color:var(--r-light)">UCAH '+ucah+' ('+pct(ucah,tot)+'%)</span>'
                +'<span style="font-size:11px;color:var(--mu)">'+kmH.toLocaleString('es-AR')+' km</span>'
                +'<span style="font-size:11px;color:var(--c)">ACAB '+kmHA.toLocaleString('es-AR')+'km ('+pct(kmHA,kmH)+'%)</span>'
                +'<span style="font-size:11px;color:var(--r-light)">UCAH '+kmHU.toLocaleString('es-AR')+'km ('+pct(kmHU,kmH)+'%)</span>'
                +'<span id="arrow-'+hid+'" style="color:var(--hi);font-size:12px;transition:transform .2s">▶</span>'
                +'</div>'
                +'<div id="hoja-body-'+hid+'" style="display:none;padding:0 14px 12px">'
                +'<div style="height:1px;background:var(--d5);margin-bottom:10px"></div>'
                +'<div style="overflow-x:auto"><table class="data-table" style="font-size:12px">'
                +'<thead><tr><th>F.Prog.</th><th>Fecha</th><th>Hora</th><th>Cancha</th><th>Categoría</th><th>Árbitro 1</th><th>Árbitro 2</th><th>Asoc.</th></tr></thead>'
                +'<tbody>'+(function(){const _seen=new Set();return partidos.map(d=>{
                  const km1=d.km_arb1||0;
                  const km2=d.km_arb2||0;
                  const _k1=(d.arbitro1||'')+'|'+(d.dia||'')+'|'+(d.cancha||'');
                  const _k2=(d.arbitro2||'')+'|'+(d.dia||'')+'|'+(d.cancha||'');
                  const _s1=km1>0&&!_seen.has(_k1);if(_s1)_seen.add(_k1);
                  const _s2=km2>0&&!_seen.has(_k2);if(_s2)_seen.add(_k2);
                  const km1Show=_s1?km1+'km':'';
                  const km2Show=_s2?km2+'km':'';
                  return '<tr>'
                    +'<td class="mono">'+d.fecha+'</td>'
                    +'<td style="font-size:11px">'+d.dia+'</td>'
                    +'<td class="mono">'+d.hora+'</td>'
                    +'<td>'+d.cancha+'</td>'
                    +'<td>'+d.categoria+'</td>'
                    +'<td style="font-weight:500">'+d.arbitro1+(_s1?' <span class="mono" style="font-size:10px;color:var(--c)">'+km1Show+'</span>':'')+'</td>'
                    +'<td style="color:var(--mu)">'+d.arbitro2+(_s2?' <span class="mono" style="font-size:10px;color:var(--c)">'+km2Show+'</span>':'')+'</td>'
                    +'<td><span class="badge '+(d.asociacion==='ACAB'?'badge-a':'badge-u')+'">'+d.asociacion+'</span></td>'
                    +'</tr>';
                }).join('');})()
                +'</tbody></table></div></div></div>';
            }).join('');
          })()}
        </div>
      </div>
    </div>
    <div style="border:1px solid var(--d5);border-radius:var(--rs);margin-bottom:8px;overflow:hidden">
      <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;background:var(--d4)" data-hoja="e-ranking" onclick="toggleHoja(this.dataset.hoja)">
        <span style="font-size:13px;font-weight:600;color:var(--tx);flex:1">Ranking completo de árbitros</span>
        <span id="arrow-e-ranking" style="color:var(--hi);font-size:12px;transition:transform .2s">▶</span>
      </div>
      <div id="hoja-body-e-ranking" style="display:none;padding:14px">
        <div style="overflow-x:auto"><table class="data-table">
          <thead><tr><th>#</th><th>Árbitro</th><th>Partidos</th><th>KM est.</th><th>Adultos</th><th>Inferiores</th><th>Asoc.</th></tr></thead>
          <tbody>${topArb.map(([nombre,n],i)=>{
            const arb=ARBITROS.find(a=>normNombre(a.nombre).includes(normNombre(nombre).split(' ')[0]));
            const pts=getPartidosArbitro(nombre);
            const km=getKmArbitro(nombre);
            const adt=pts.filter(d=>esAdulto(d.categoria)).length;
            return`<tr>
              <td style="color:var(--hi)">${i+1}</td>
              <td style="font-weight:500">${nombre}</td>
              <td><strong>${n}</strong></td>
              <td class="mono" style="color:var(--mu)">${km}km</td>
              <td>${adt}</td><td>${pts.length-adt}</td>
              <td>${arb?`<span class="badge ${arb.asociacion==='ACAB'?'badge-a':'badge-u'}">${arb.asociacion}</span>`:''}</td>
            </tr>`;}).join('')}
          </tbody>
        </table></div>
      </div>
    </div>`;
}

// ── PANEL ÁRBITRO ────────────────────────────────────────
function toggleHoja(hid){
  const body=document.getElementById('hoja-body-'+hid);
  const arrow=document.getElementById('arrow-'+hid);
  if(!body||!arrow)return;
  const open=body.style.display==='block';
  body.style.display=open?'none':'block';
  arrow.style.transform=open?'rotate(0deg)':'rotate(90deg)';
}

function renderArbPerfil(){
  if(!currentUser||currentUser.tipo!=='arbitro')return;
  const a=currentUser;
  const partidos=getPartidosArbitro(a.nombre);
  const km=getKmArbitro(currentUser.nombre);
  const isA=a.asociacion==='ACAB';
  document.getElementById('tab-arb-perfil').innerHTML=`
    <div class="arb-hero">
      <div class="profile-big-avatar ${isA?'av-a':'av-u'}">${initials(a.nombre)}</div>
      <div>
        <div style="font-size:22px;font-weight:600;margin-bottom:8px">${a.nombre}</div>
        <span class="badge ${isA?'badge-a':'badge-u'}">${a.asociacion}</span>
        ${a.categoria_max?`<span class="badge badge-info" style="margin-left:8px">${a.categoria_max}</span>`:''}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="card" style="margin:0">
        <div class="card-title">Mis datos</div>
        ${[['Email',a.email||'—'],['Teléfono',a.telefono||'—'],['Fecha de nac.',a.fecha_nac||'—'],['Asociación',a.asociacion],['Categoría máx.',a.categoria_max||'—']].map(([k,v])=>`<div class="stat-row"><span class="stat-label">${k}</span><span class="stat-value" style="font-size:13px">${v}</span></div>`).join('')}
      </div>
      <div class="card" style="margin:0">
        <div class="card-title">Mi temporada</div>
        <div class="stat-row"><span class="stat-label">Partidos arbitrados</span><span class="stat-value" style="font-size:20px">${partidos.length}</span></div>
        <div class="stat-row"><span class="stat-label">KM recorridos</span><span class="stat-value">${km.toLocaleString('es-AR')} km</span></div>
        <div class="stat-row"><span class="stat-label">Adultos</span><span class="stat-value">${partidos.filter(d=>esAdulto(d.categoria)).length}</span></div>
        <div class="stat-row"><span class="stat-label">Inferiores</span><span class="stat-value">${partidos.filter(d=>!esAdulto(d.categoria)).length}</span></div>
      </div>
    </div>`;
}

function renderArbPartidos(){
  if(!currentUser||currentUser.tipo!=='arbitro')return;
  const partidos=getPartidosArbitro(currentUser.nombre);
  document.getElementById('tab-arb-partidos').innerHTML=`
    <div class="card">
      <div class="card-title">Mis partidos — ${partidos.length} en total</div>
      ${partidos.length===0?'<div style="color:var(--mu);font-size:13px">Sin partidos registrados</div>':
      `<div style="overflow-x:auto"><table class="data-table">
        <thead><tr><th>F.</th><th>Fecha</th><th>Hora</th><th>Cancha</th><th>Categoría</th><th>Equipos</th><th>Rol</th></tr></thead>

            <td class="mono">${d.hora}</td><td>${d.cancha}</td><td>${d.categoria}</td>

          </tr>`;}).join('')}</tbody>
      </table></div>`}
    </div>`;
}

function renderArbStats(){
  if(!currentUser||currentUser.tipo!=='arbitro')return;
  const a=currentUser;
  const partidos=getPartidosArbitro(a.nombre);
  const km=getKmArbitro(currentUser.nombre);
  const arancel=partidos.reduce((s,d)=>s+(parseFloat(d.arancel)||0),0);
  const cats={};partidos.forEach(d=>{const cat=(d.categoria||'').trim();if(cat)cats[cat]=(cats[cat]||0)+1;});
  document.getElementById('tab-arb-stats').innerHTML=`
    <div class="metrics-grid" style="grid-template-columns:repeat(2,1fr)">
      <div class="metric m-c"><div class="metric-label">Partidos</div><div class="metric-value">${partidos.length}</div></div>
      <div class="metric m-b"><div class="metric-label">KM recorridos</div><div class="metric-value" style="font-size:20px">${km.toLocaleString('es-AR')}</div><div class="metric-sub">estimados</div></div>
      <div class="metric m-g"><div class="metric-label">Arancel acum.</div><div class="metric-value" style="font-size:18px">$${arancel.toLocaleString('es-AR')}</div></div>
      <div class="metric m-g"><div class="metric-label">Categorías</div><div class="metric-value">${Object.keys(cats).length}</div></div>
    </div>
    <div class="card">
      <div class="card-title">Partidos por categoría</div>
      ${Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([cat,n])=>`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <span style="font-size:13px;color:var(--mu);flex:1">${cat}</span>
          <div style="width:100px;height:5px;background:var(--d5);border-radius:3px;overflow:hidden">
            <div style="height:100%;background:var(--c);width:${partidos.length>0?n/partidos.length*100:0}%"></div>
          </div>
          <span style="font-size:13px;font-weight:600;min-width:24px;text-align:right">${n}</span>
        </div>`).join('')}
    </div>`;
}
</script>
