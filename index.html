<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FeCoBal · Gestión Arbitral</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --r:#E8272A;--r-dim:#7a1214;--r-bg:#2a1415;--r-light:#ff6b6e;
  --b:#2B3990;--b-dim:#1a2260;--b-bg:#161c3a;
  --c:#29ABE2;--c-dim:#1a7aab;--c-bg:#0f2a3a;--c-light:#6dcfff;
  --d1:#0d0d10;--d2:#14141a;--d3:#1c1c24;--d4:#25252f;--d5:#32323e;--d6:#424250;
  --tx:#f0f0f4;--mu:#8888a0;--hi:#505068;
  --rs:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--d1);color:var(--tx);min-height:100vh;display:flex;flex-direction:column}
.screen{display:none}.screen.active{display:flex;flex-direction:column;flex:1}

/* TOP BAR */
.topbar{background:var(--d2);border-bottom:1px solid var(--d4);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{font-size:15px;font-weight:700;letter-spacing:.01em}
.logo-fe{color:var(--r)}.logo-co{color:var(--b)}.logo-bal{color:var(--c)}
.logo-sep{color:var(--hi);margin:0 6px;font-weight:400}
.logo-sub{font-size:12px;color:var(--mu);font-weight:400}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.user-pill{background:var(--d4);border-radius:20px;padding:5px 14px 5px 5px;display:flex;align-items:center;gap:8px;cursor:pointer}
.user-pill:hover{background:var(--d5)}
.user-avatar{width:26px;height:26px;border-radius:50%;background:var(--b);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--c)}
.user-name{font-size:12px;color:var(--mu)}
.btn-logout{font-size:12px;color:var(--hi);background:none;border:none;cursor:pointer;padding:4px 8px}
.btn-logout:hover{color:var(--mu)}

/* SIDEBAR + CONTENT */
.app-body{display:flex;flex:1;overflow:hidden;height:calc(100vh - 53px)}
.sidebar{background:var(--d2);width:200px;flex-shrink:0;padding:16px 8px;display:flex;flex-direction:column;border-right:1px solid var(--d4);overflow-y:auto}
.s-section{font-size:10px;color:var(--hi);letter-spacing:.08em;text-transform:uppercase;padding:12px 10px 5px;margin-top:4px}
.s-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--rs);font-size:13px;color:var(--mu);cursor:pointer;margin-bottom:1px;transition:background .12s,color .12s;position:relative}
.s-item:hover:not(.active){background:var(--d3);color:var(--tx)}
.s-item.active{background:var(--d4);color:var(--tx)}
.s-indicator{width:3px;height:16px;border-radius:2px;flex-shrink:0;background:transparent}
.s-item.active .s-indicator{background:var(--c)}
.s-dot{width:6px;height:6px;border-radius:50%;background:var(--hi);flex-shrink:0;transition:background .12s}
.s-item.active .s-dot,.s-item:hover .s-dot{background:var(--c)}

/* MAIN CONTENT */
.main{flex:1;overflow-y:auto;padding:24px}

/* CARDS */
.card{background:var(--d3);border:1px solid var(--d4);border-radius:var(--rl);padding:16px 20px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--mu);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';display:block;width:3px;height:12px;border-radius:2px;background:var(--c);flex-shrink:0}

/* METRICS GRID */
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.metric{background:var(--d3);border:1px solid var(--d4);border-radius:var(--rl);padding:14px 16px;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:var(--rl) 0 0 var(--rl)}
.metric.m-c::before{background:var(--c)}
.metric.m-b::before{background:var(--b)}
.metric.m-r::before{background:var(--r)}
.metric.m-g::before{background:var(--d6)}
.metric-label{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.metric-value{font-size:24px;font-weight:600;letter-spacing:-.02em;color:var(--tx);line-height:1}
.metric-sub{font-size:11px;color:var(--hi);margin-top:5px}

/* BALANCE TABLE */
.balance-table{width:100%;border-collapse:collapse;font-size:13px}
.balance-table th{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--mu);padding:8px 12px;border-bottom:1px solid var(--d5);text-align:left}
.balance-table th.acab{color:var(--c)}
.balance-table th.ucah{color:var(--r)}
.balance-table td{padding:10px 12px;border-bottom:1px solid var(--d4);color:var(--tx);font-size:13px}
.balance-table tr:last-child td{border-bottom:none}
.balance-table td.row-label{color:var(--mu);font-size:12px}
.balance-table td.val-acab{color:var(--c);font-weight:500}
.balance-table td.val-ucah{color:var(--r);font-weight:500}
.pct{font-size:11px;color:var(--hi);margin-left:4px;font-weight:400}

/* BALANCE BAR */
.bbar{height:8px;border-radius:4px;overflow:hidden;display:flex;margin:8px 0 4px}
.bbar-a{height:100%;background:var(--c)}
.bbar-u{height:100%;background:var(--r)}
.bbar-labels{display:flex;justify-content:space-between;font-size:11px}
.bbar-la{color:var(--c)}.bbar-lu{color:var(--r)}

/* FECHA BALANCE */
.fecha-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.fecha-num{font-size:11px;font-weight:600;color:var(--mu);min-width:52px}
.fecha-bar{flex:1;height:6px;background:var(--d5);border-radius:3px;overflow:hidden;display:flex}
.fb-a{height:100%;background:var(--c)}
.fb-u{height:100%;background:var(--r)}
.fecha-tot{font-size:11px;color:var(--hi);min-width:28px;text-align:right}

/* ÁRBITROS */
.arb-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.arb-card{background:var(--d3);border:1px solid var(--d4);border-radius:var(--rl);padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .15s,background .15s}
.arb-card:hover{border-color:var(--d6);background:var(--d4)}
.arb-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.av-a{background:var(--b-bg);color:var(--c);border:1px solid var(--b)}
.av-u{background:var(--r-bg);color:var(--r-light);border:1px solid var(--r-dim)}
.arb-info{flex:1;min-width:0}
.arb-name{font-size:13px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.arb-meta{font-size:11px;color:var(--hi);margin-top:2px}
.arb-stats{text-align:right;flex-shrink:0}
.arb-pts{font-size:14px;font-weight:600;color:var(--tx)}
.arb-km{font-size:10px;color:var(--hi)}

/* BADGE */
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:100px}
.badge-a{background:var(--b-bg);color:var(--c);border:1px solid var(--b-dim)}
.badge-u{background:var(--r-bg);color:var(--r-light);border:1px solid var(--r-dim)}
.badge-info{background:var(--c-bg);color:var(--c);border:1px solid var(--c-dim)}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--hi);padding:8px 12px;border-bottom:1px solid var(--d5);text-align:left}
.data-table td{padding:9px 12px;border-bottom:1px solid var(--d4);color:var(--tx)}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--d4)}

/* LEGAJO */
.profile-header{display:flex;align-items:flex-start;gap:16px}
.profile-big-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--d4);font-size:13px}
.stat-row:last-child{border-bottom:none}
.stat-label{color:var(--mu)}
.stat-value{font-weight:500;color:var(--tx)}

/* PANEL ÁRBITRO */
.arb-hero{background:linear-gradient(135deg,var(--b-bg) 0%,var(--d3) 100%);border:1px solid var(--b-dim);border-radius:var(--rl);padding:24px;margin-bottom:14px;display:flex;align-items:center;gap:16px}

/* INPUTS */
input,select{background:var(--d4);border:1px solid var(--d5);border-radius:var(--rs);color:var(--tx);padding:8px 12px;font-size:13px;font-family:'DM Sans',sans-serif;width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--c)}
select option{background:var(--d3)}
.btn{padding:8px 20px;border-radius:var(--rs);font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:opacity .15s,background .15s;border:none}
.btn-primary{background:var(--c);color:#fff}.btn-primary:hover{opacity:.88}
.btn-ghost{background:var(--d4);color:var(--mu);border:1px solid var(--d5)}.btn-ghost:hover{color:var(--tx)}

/* MONO */
.mono{font-family:'DM Mono',monospace;font-size:12px}

/* ROW */
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>*{flex:1;min-width:0}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--d1)}
.login-card{background:var(--d2);border:1px solid var(--d4);border-radius:var(--rl);padding:32px;width:360px}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo .logo{font-size:22px}
.login-logo .sub{font-size:13px;color:var(--mu);margin-top:4px}

@media(max-width:700px){
  .sidebar{width:52px}.s-item span{display:none}.s-section{display:none}.metrics-grid{grid-template-columns:1fr 1fr}.arb-grid{grid-template-columns:1fr}
}
</style>
</head>

</div>

function getDistancia(o,d){if(o===d)return 0;return DISTANCIAS[o+'|'+d]||DISTANCIAS[d+'|'+o]||0;}
function getCiudadCancha(cancha){
  const c=(cancha||'').trim();
  const sede=SEDES.find(s=>s.nombre===c||s.nombre.toUpperCase()===c.toUpperCase());
  if(sede) return sede.ciudad;
  if(CANCHA_CIUDAD[c.toUpperCase()]) return CANCHA_CIUDAD[c.toUpperCase()];
  return 'Córdoba Capital';
}
function getResidencia(nombre){
  const arb=ARBITROS.find(a=>normNombre(a.nombre)===normNombre(nombre));
  if(arb&&arb.residencia) return arb.residencia;
  if(arb&&arb.id&&RESIDENCIAS[arb.id]) return RESIDENCIAS[arb.id];
  const raw=(nombre||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[,.']/g,' ').replace(/\s+/g,' ').trim();
  if(RESIDENCIAS[raw]) return RESIDENCIAS[raw];
  return 'Córdoba Capital';
}
function getKm(cancha){return 0;}

function normNombre(n){return(n||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[,\s]+/g,' ').trim();}
function initials(nombre){return nombre.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function pct(a,b){return b>0?(a/b*100).toFixed(1):0;}

function getPartidosArbitro(nombre){
  const arb=ARBITROS.find(a=>normNombre(a.nombre)===normNombre(nombre));
  if(arb&&arb.id){
    return DESIGNACIONES.filter(d=>d.arb_id1===arb.id||d.arb_id2===arb.id);
  }
  const n=normNombre(nombre);
  return DESIGNACIONES.filter(d=>normNombre(d.arbitro1)===n||normNombre(d.arbitro2)===n);
}

function getKmArbitro(nombre){
  const residencia=getResidencia(nombre);
  const partidos=getPartidosArbitro(nombre);
  const viajes=new Map();
  partidos.forEach(d=>{
    const ciudadCancha=getCiudadCancha(d.cancha);
    const dist=getDistancia(residencia,ciudadCancha);
    if(dist>0){
      const key=(d.hoja||'')+'|'+(d.fecha||'')+'|'+(d.cancha||'').toUpperCase();
      if(!viajes.has(key)) viajes.set(key,dist);
    }
  });
  let total=0;
  viajes.forEach(dist=>total+=dist*2);
  return total;
}

function getKmAsociacion(asoc){
  // Sum unique viajes per arbitro for this asociacion only
  const viajesMap = new Map();
  DESIGNACIONES.filter(d=>d.asociacion===asoc).forEach(d=>{
    [[d.arbitro1, d.km_arb1||0],[d.arbitro2, d.km_arb2||0]].forEach(([arb,km])=>{
      if(!arb||km<=0) return;
      const key = arb+'|'+(d.hoja||'')+'|'+(d.fecha||'')+'|'+(d.cancha||'').toUpperCase();
      if(!viajesMap.has(key)) viajesMap.set(key, km);
    });
  });
  let total=0; viajesMap.forEach(km=>total+=km);
  return total;
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{s.style.display='none';s.classList.remove('active');});
  const el=document.getElementById('screen-'+id);
  el.style.display='flex';el.classList.add('active');
}

function switchSidebar(tabId,el){
  const sidebar=el.closest('.app-body');
  sidebar.querySelectorAll('.s-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  // Hide all tab-content including legajo
  sidebar.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');
  const legajo=document.getElementById('tab-legajo');
  if(legajo) legajo.style.display='none';
  const tab=document.getElementById(tabId);
  if(tab) tab.style.display='block';
  if(tabId==='tab-dashboard') renderDashboard();
  else if(tabId==='tab-arbitros') renderArbitros();
  else if(tabId==='tab-designaciones') renderDesignaciones();
  else if(tabId==='tab-estadisticas') renderEstadisticas();
  else if(tabId==='tab-arb-perfil') renderArbPerfil();
  else if(tabId==='tab-arb-partidos') renderArbPartidos();
  else if(tabId==='tab-arb-stats') renderArbStats();
  else if(tabId==='tab-arb-examenes') renderArbExamenes();
}

function doLogin(){
  const user=document.getElementById('login-user').value.trim().toLowerCase();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-error');
  if(user===ADMIN_USER&&pass===ADMIN_PASS){
    currentUser={tipo:'admin',nombre:'Alexis Salera'};
    document.getElementById('admin-avatar').textContent='AS';
    document.getElementById('admin-name-display').textContent='Alexis Salera';
    showScreen('admin');
    renderDashboard();
    err.style.display='none';return;
  }
  const arb=ARBITROS.find(a=>a.username===user&&a.password===pass);
  if(arb){
    currentUser={tipo:'arbitro',...arb};
    const ini=initials(arb.nombre);
    document.getElementById('arb-avatar-top').textContent=ini;
    document.getElementById('arb-name-top').textContent=arb.nombre;
    showScreen('arbitro');
    renderArbPerfil();err.style.display='none';return;
  }
  err.style.display='block';
}

      // ── 22. COSTO POR FECHA ──
      const costoFecha={};
      DESIGNACIONES.forEach(d=>{
        const h=d.hoja||'Sin fecha';
        if(!costoFecha[h])costoFecha[h]={arancel:0,viatico:0};
        costoFecha[h].arancel+=(parseInt(d.arancel)||0);
        costoFecha[h].viatico+=(parseInt(d.viatico)||0);
      });
      const orden=['FECHA 1','REP1','FECHA 2','FECHA 3','FECHA 4','FECHA 5','FECHA 6','FECHA 7','F REC 2'];
      const fechasOrden=orden.filter(h=>costoFecha[h]).concat(Object.keys(costoFecha).filter(h=>!orden.includes(h)));
      const costoHtml='<table class="data-table" style="font-size:12px"><thead><tr><th>Fecha</th><th>Aranceles</th><th>Viáticos</th><th>Total</th></tr></thead><tbody>'
        +fechasOrden.map(h=>{const c=costoFecha[h];return '<tr><td style="font-weight:500">'+h+'</td><td>'+fmt(c.arancel)+'</td><td>'+fmt(c.viatico)+'</td><td style="font-weight:600">'+fmt(c.arancel+c.viatico)+'</td></tr>';}).join('')
        +'<tr style="border-top:2px solid var(--d5);font-weight:700"><td>TOTAL</td><td>'+fmt(fechasOrden.reduce((s,h)=>s+costoFecha[h].arancel,0))+'</td><td>'+fmt(fechasOrden.reduce((s,h)=>s+costoFecha[h].viatico,0))+'</td><td>'+fmt(fechasOrden.reduce((s,h)=>s+costoFecha[h].arancel+costoFecha[h].viatico,0))+'</td></tr>'
        +'</tbody></table>';

      // ── 25. COSTO PROMEDIO POR PARTIDO POR SEDE ──
      const costoSede={};
      DESIGNACIONES.forEach(d=>{
        const s=(d.cancha||'').trim();
        if(s){
          if(!costoSede[s])costoSede[s]={arancel:0,viatico:0,n:0};
          costoSede[s].arancel+=(parseInt(d.arancel)||0);
          costoSede[s].viatico+=(parseInt(d.viatico)||0);
          costoSede[s].n++;
        }
      });
      const topCostoSede=Object.entries(costoSede).sort((a,b)=>(b[1].arancel+b[1].viatico)/b[1].n-(a[1].arancel+a[1].viatico)/a[1].n);
      const costoSedeHtml='<table class="data-table" style="font-size:12px"><thead><tr><th>Sede</th><th>Partidos</th><th>Arancel total</th><th>Viático total</th><th>Prom/partido</th></tr></thead><tbody>'
        +topCostoSede.map(([sede,v])=>'<tr><td>'+sede+'</td><td>'+v.n+'</td><td>'+fmt(v.arancel)+'</td><td>'+fmt(v.viatico)+'</td><td style="font-weight:600">'+fmt(Math.round((v.arancel+v.viatico)/v.n))+'</td></tr>').join('')
        +'</tbody></table>';

      // ── 27. FEM vs MASC ──
      let fem=0,masc=0,mixto=0;
      DESIGNACIONES.forEach(d=>{
        const cat=(d.categoria||'').toUpperCase();
        if(cat.includes('FEM'))fem++;
        else if(cat.includes('MASC')||cat.includes('MAYOR B ')||cat.includes('MAYOR C'))masc++;
        else mixto++;
      });
      const genTotal=fem+masc+mixto;
      const genPct=(n)=>genTotal?Math.round(n/genTotal*100):0;
      const genHtml='<div style="margin-bottom:14px">'
        +'<div style="display:flex;gap:20px;margin-bottom:12px">'
        +'<div style="text-align:center;flex:1"><div style="font-size:24px;font-weight:700;color:var(--c)">'+fem+'</div><div style="font-size:11px;color:var(--mu)">Femenino ('+genPct(fem)+'%)</div></div>'
        +'<div style="text-align:center;flex:1"><div style="font-size:24px;font-weight:700;color:var(--hi)">'+masc+'</div><div style="font-size:11px;color:var(--mu)">Masculino ('+genPct(masc)+'%)</div></div>'
        +(mixto?'<div style="text-align:center;flex:1"><div style="font-size:24px;font-weight:700;color:var(--mu)">'+mixto+'</div><div style="font-size:11px;color:var(--mu)">Sin definir ('+genPct(mixto)+'%)</div></div>':'')
        +'</div>'
        +'<div class="bbar"><div style="height:100%;background:var(--c);width:'+genPct(fem)+'%"></div><div style="height:100%;background:var(--hi);width:'+genPct(masc)+'%"></div></div>'
        +'<div class="bbar-labels"><span style="font-size:10px;color:var(--c)">FEM '+genPct(fem)+'%</span><span style="font-size:10px;color:var(--hi)">MASC '+genPct(masc)+'%</span></div>'
        +'</div>';

      // ── DISTRIBUCIÓN POR CLUB ──
      const INFANTIL_RE = /infantil/i;
      const clubAsoc = {};
      DESIGNACIONES.forEach(d => {
        if (INFANTIL_RE.test(d.categoria || '')) return;
        const asoc = (d.asociacion || '').toUpperCase();
        if (asoc !== 'ACAB' && asoc !== 'UCAH') return;
        [d.equipo_a, d.equipo_b].forEach(eq => {
          if (!eq) return;
          const n = eq.trim();
          if (!clubAsoc[n]) clubAsoc[n] = { acab: 0, ucah: 0 };
          if (asoc === 'ACAB') clubAsoc[n].acab++; else clubAsoc[n].ucah++;
        });
      });
      const clubRows = Object.entries(clubAsoc)
        .map(([c, v]) => ({ club: c, acab: v.acab, ucah: v.ucah, total: v.acab + v.ucah }))
        .filter(r => r.total >= 5)
        .sort((a, b) => b.total - a.total);
      const totalPartidosAdultos = DESIGNACIONES.filter(d => !INFANTIL_RE.test(d.categoria || '') && ['ACAB','UCAH'].includes((d.asociacion||'').toUpperCase())).length;
      const acabTotal = DESIGNACIONES.filter(d => !INFANTIL_RE.test(d.categoria||'') && (d.asociacion||'').toUpperCase()==='ACAB').length;
      const ucahTotal = DESIGNACIONES.filter(d => !INFANTIL_RE.test(d.categoria||'') && (d.asociacion||'').toUpperCase()==='UCAH').length;
      const distClubHtml =
        '<div style="margin-bottom:14px">'
        + '<div style="display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap">'
        + '<div style="flex:1;min-width:100px;background:var(--d4);border-radius:var(--rs);padding:10px 14px;text-align:center"><div style="font-size:22px;font-weight:700;color:var(--tx)">' + totalPartidosAdultos + '</div><div style="font-size:11px;color:var(--mu)">Partidos (sin infantil)</div></div>'
        + '<div style="flex:1;min-width:100px;background:var(--d4);border-radius:var(--rs);padding:10px 14px;text-align:center"><div style="font-size:22px;font-weight:700;color:var(--c)">' + acabTotal + ' <span style="font-size:13px;font-weight:400">(' + (totalPartidosAdultos ? Math.round(acabTotal/totalPartidosAdultos*100) : 0) + '%)</span></div><div style="font-size:11px;color:var(--mu)">ACAB</div></div>'
        + '<div style="flex:1;min-width:100px;background:var(--d4);border-radius:var(--rs);padding:10px 14px;text-align:center"><div style="font-size:22px;font-weight:700;color:var(--r-light)">' + ucahTotal + ' <span style="font-size:13px;font-weight:400">(' + (totalPartidosAdultos ? Math.round(ucahTotal/totalPartidosAdultos*100) : 0) + '%)</span></div><div style="font-size:11px;color:var(--mu)">UCAH</div></div>'
        + '</div>'
        + '<div style="overflow-x:auto"><table class="data-table" style="font-size:12px">'
        + '<thead><tr><th>#</th><th>Club / Equipo</th><th style="text-align:right">ACAB</th><th style="text-align:right">UCAH</th><th style="text-align:right">Total</th><th style="min-width:120px">Distribución</th><th style="text-align:right">% ACAB</th><th style="text-align:right">% UCAH</th></tr></thead>'
        + '<tbody>'
        + clubRows.map((r, i) => {
            const pctA = Math.round(r.acab / r.total * 100);
            const pctU = 100 - pctA;
            return '<tr>'
              + '<td style="color:var(--hi)">' + (i+1) + '</td>'
              + '<td style="font-weight:500">' + r.club + '</td>'
              + '<td style="text-align:right;color:var(--c)">' + r.acab + '</td>'
              + '<td style="text-align:right;color:var(--r-light)">' + r.ucah + '</td>'
              + '<td style="text-align:right;font-weight:600">' + r.total + '</td>'
              + '<td><div style="display:flex;height:8px;border-radius:4px;overflow:hidden;min-width:100px">'
              +   '<div style="background:var(--c);width:' + pctA + '%"></div>'
              +   '<div style="background:var(--r-light);width:' + pctU + '%"></div>'
              + '</div></td>'
              + '<td style="text-align:right;font-weight:600;color:var(--c)">' + pctA + '%</td>'
              + '<td style="text-align:right;color:var(--r-light)">' + pctU + '%</td>'
              + '</tr>';
          }).join('')
        + '</tbody></table></div>'
        + '<div style="margin-top:8px;font-size:11px;color:var(--mu)">Solo incluye equipos con 5 o más partidos designados. Excluye categorías Infantil.</div>'
        + '</div>';

      return aE('parejas','Parejas de árbitros más frecuentes',parejasHtml)
        +aE('cargadia','Máxima carga por día',cargaHtml)
        +aE('kmprom','Promedio KM por partido',kmPromHtml)
        +aE('distclub','Distribución ACAB/UCAH por club',distClubHtml)
        +aE('sedes','Ranking de sedes',sedesHtml)
        +aE('aranceles','Total aranceles',arancelHtml)
        +aE('viaticos','Viáticos por club',viatHtml)
        +aE('costofecha','Costo por fecha/jornada',costoHtml)
        +aE('costosede','Costo promedio por sede',costoSedeHtml)
        +aE('genero','Balance FEM vs MASC',genHtml);
      }catch(e){console.error('Error en estadísticas:',e);return '<div style="color:red;padding:14px">Error: '+e.message+'</div>';}
    })()}
    `;
}

function toggleHoja(hid){
  const body=document.getElementById('hoja-body-'+hid);
  const arrow=document.getElementById('arrow-'+hid);
  if(!body||!arrow)return;
  const open=body.style.display==='block';
  body.style.display=open?'none':'block';
  arrow.style.transform=open?'rotate(0deg)':'rotate(90deg)';
}

function toggleTopArb(btn,total){
  const r=document.getElementById('toparb-rest');
  if(!r)return;
  const open=r.style.display==='block';
  r.style.display=open?'none':'block';
  btn.textContent=open?'Ver todos ('+total+' árbitros)':'Ver menos';
}

function validateData(){
  const issues=[];
  const arbIds=new Set(ARBITROS.map(a=>a.id));
  const sedeIds=new Set(SEDES.map(s=>s.id));
  const clubIds=new Set(CLUBES.map(c=>c.id));

  // Duplicados en árbitros
  const seenArb={};
  ARBITROS.forEach(a=>{const n=normNombre(a.nombre);if(seenArb[n])issues.push('⚠️ Árbitro duplicado: '+a.nombre);seenArb[n]=true;});
  // Duplicados en sedes
  const seenSede={};
  SEDES.forEach(s=>{if(seenSede[s.nombre])issues.push('⚠️ Sede duplicada: '+s.nombre);seenSede[s.nombre]=true;});
  // Duplicados en clubes
  const seenClub={};
  CLUBES.forEach(c=>{if(seenClub[c.nombre])issues.push('⚠️ Club duplicado: '+c.nombre);seenClub[c.nombre]=true;});

  // IDs faltantes
  ARBITROS.forEach(a=>{if(!a.id)issues.push('🔴 Árbitro sin ID: '+a.nombre);});
  SEDES.forEach(s=>{if(!s.id)issues.push('🔴 Sede sin ID: '+s.nombre);});
  CLUBES.forEach(c=>{if(!c.id)issues.push('🔴 Club sin ID: '+c.nombre);});

  // Designaciones con IDs que no matchean
  DESIGNACIONES.forEach((d,i)=>{
    if(d.arb_id1&&!arbIds.has(d.arb_id1))issues.push('🔴 Partido '+(i+1)+': arb_id1 '+d.arb_id1+' no existe ('+d.arbitro1+')');
    if(d.arb_id2&&!arbIds.has(d.arb_id2))issues.push('🔴 Partido '+(i+1)+': arb_id2 '+d.arb_id2+' no existe ('+d.arbitro2+')');
    if(d.sede_id&&!sedeIds.has(d.sede_id))issues.push('🔴 Partido '+(i+1)+': sede_id '+d.sede_id+' no existe ('+d.cancha+')');
    if(d.club_id_a&&!clubIds.has(d.club_id_a))issues.push('🔴 Partido '+(i+1)+': club_id_a '+d.club_id_a+' no existe ('+d.equipo_a+')');
    if(d.club_id_b&&!clubIds.has(d.club_id_b))issues.push('🔴 Partido '+(i+1)+': club_id_b '+d.club_id_b+' no existe ('+d.equipo_b+')');
    // Sin ID asignado
    if(d.arbitro1&&!d.arb_id1)issues.push('🟡 Partido '+(i+1)+': árbitro1 "'+d.arbitro1+'" sin ID');
    if(d.arbitro2&&!d.arb_id2)issues.push('🟡 Partido '+(i+1)+': árbitro2 "'+d.arbitro2+'" sin ID');
    if(d.cancha&&!d.sede_id)issues.push('🟡 Partido '+(i+1)+': cancha "'+d.cancha+'" sin sede_id');
    if(d.equipo_a&&!d.club_id_a)issues.push('🟡 Partido '+(i+1)+': equipo_a "'+d.equipo_a+'" sin club_id');
    if(d.equipo_b&&!d.club_id_b)issues.push('🟡 Partido '+(i+1)+': equipo_b "'+d.equipo_b+'" sin club_id');
  });

  // Árbitros en designaciones sin ficha
  const allNames=new Set(ARBITROS.map(a=>normNombre(a.nombre)));
  const missingArb=new Set();
  DESIGNACIONES.forEach(d=>{
    if(d.arbitro1&&!allNames.has(normNombre(d.arbitro1)))missingArb.add(d.arbitro1);
    if(d.arbitro2&&!allNames.has(normNombre(d.arbitro2)))missingArb.add(d.arbitro2);
  });
  missingArb.forEach(m=>issues.push('🟡 Árbitro sin ficha: '+m));

  // Sedes sin ciudad en DISTANCIAS
  const distCities=new Set();
  Object.keys(DISTANCIAS).forEach(k=>{k.split('|').forEach(c=>distCities.add(c));});
  distCities.add('Córdoba Capital');
  SEDES.forEach(s=>{
    if(s.ciudad&&!distCities.has(s.ciudad))issues.push('🔴 Sede "'+s.nombre+'": ciudad "'+s.ciudad+'" no tiene distancias configuradas');
  });

  // Residencias sin distancias
  ARBITROS.forEach(a=>{
    if(a.residencia&&!distCities.has(a.residencia))issues.push('🔴 Árbitro "'+a.nombre+'": residencia "'+a.residencia+'" sin distancias');
  });

  // Resultado
  if(issues.length){
    console.warn('VALIDACIÓN: '+issues.length+' problemas encontrados');
    issues.forEach(i=>console.warn(i));
  }else{
    console.log('✅ VALIDACIÓN: todo OK');
  }
  return issues;
}
